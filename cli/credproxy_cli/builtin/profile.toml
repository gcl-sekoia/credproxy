# credproxy built-in distribution profile.
#
# These are the distribution-level defaults the CLI picks for itself. An org
# *overlay* (profile/profile.toml, or $CREDPROXY_PROFILE_DIR/profile.toml) may
# override any subset of these keys -- it does not need to repeat the rest.
# See docs/forking.md. This is the upstream default; do not edit it in a fork
# (edit the overlay instead, so upstream merges stay clean).

# Proxy image tag the CLI builds (`credproxy dev build`) and runs.
image_tag = "credproxy:dev"

# Default workspace container image when `create` is run without --image. The
# default is a devcontainers base shipping a non-root sudo user (vscode, uid
# 1000) + curl + ca-certificates, so the bootstrap and a non-root shell work
# with no setup.
default_image = "mcr.microsoft.com/devcontainers/base:ubuntu"

# The default image's baked non-root user, its home, and its uid. The scaffold
# wires these in ACTIVE when a workspace uses `default_image`; for a custom
# --image they are written as commented hints (its user is unknown).
default_user = "vscode"
default_home = "/home/vscode"
default_uid  = 1000

# Fallback home for a custom (non-default) image when `home` is omitted.
generic_home = "/root"

# Setup commands the scaffold writes ACTIVE for the default image (run as root
# on each (re)created container; keep them idempotent). The default installs the
# proxy CA so HTTPS interception works immediately. An org overlay can prepend
# its own (e.g. an internal CA, a package mirror).
default_setup = [
  "curl -fsSL http://proxy.local/bootstrap.sh | sh",
]
