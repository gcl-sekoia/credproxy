# Example org profile overlay. Copy to `profile.toml` (drop `.example`) and set
# only the keys you want to change -- unset keys fall back to the bundled
# default (cli/credproxy_cli/bundled/profile.toml). See docs/forking.md.

# Point new workspaces at your org's standard image by default.
# default_image = "registry.acme.example/dev/base:latest"

# The default image's baked non-root user (the scaffold wires these in active
# when a workspace uses default_image).
# default_user = "acme"
# default_home = "/home/acme"
# default_uid  = 1000

# Rebrand the proxy image tag you build/run.
# image_tag = "acme-credproxy:latest"

# Default setup commands written active for default_image (run as root, each
# (re)create; keep idempotent). Prepend your internal CA / package mirror.
# default_setup = [
#   "curl -fsSL http://proxy.local/bootstrap.sh | sh",
#   "curl -fsSL http://proxy.local/acme-internal-ca.sh | sh",
# ]
