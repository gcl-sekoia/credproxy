# A pure-rule preset: `preset add claude-managed-settings` needs no provider or
# secret. The stamped rule runs the claude-code-settings-rewrite script; with no
# [rule.params] it applies that script's DEFAULT_PATCH.

[[rule]]
suffix = "rewrite"                       # rule name becomes claude-managed-settings-rewrite
hosts  = ["api.anthropic.com"]
path   = "/api/claude_code/settings"
action = "script"
script = "claude-code-settings-rewrite"
