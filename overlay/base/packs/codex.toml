# pack: codex — run OpenAI's Codex CLI as a client through credproxy: the OpenAI
# API key injected on the wire, plus the login step that seeds Codex's auth.json.
# The sibling of the claude-code pack, one auth family simpler — OpenAI's long-lived
# credential is a plain API key (bearer), so there's no OAuth reseal to do.
#
# Assumes the `codex` CLI is installed (add it to a toolchain tools.d fragment — the
# 50-example profile's extras.list ships `npm:@openai/codex`).
#
# AUTH: Codex has two methods — "Sign in with ChatGPT" (browser OAuth, short-lived
# rotating tokens; NOT proxyable) and an API key (long-lived, headless). This pack
# uses the API key: the documented programmatic/CI path. The container sees only a
# key-shaped placeholder in $OPENAI_API_KEY; the proxy swaps it on api.openai.com.
#
# NEUTRAL: no default vault (there's no universal OpenAI token source), so supply
# --provider/--secret (or a template [[pack]]). Deliberately carries no
# MISE_MINIMUM_RELEASE_AGE_EXCLUDES [env] (that would collide with the claude-code
# pack's, blocking the two from coexisting) — add "codex" to the toolchain's excludes
# yourself if you want its CLI force-latest.

# sk- so any client-side "starts with sk-" sniff passes; credproxy- marks it a
# sentinel. Never reaches OpenAI — the proxy swaps it — and Codex doesn't length-check.
[placeholder]
prefix  = "sk-credproxy-"
length  = 64
charset = "alnumeric"

[[part]]
suffix   = "api"                                      # -> binding codex-api
injector = "bearer"
hosts    = ["api.openai.com"]                         # Codex's default Responses API host
env      = "OPENAI_API_KEY"

# Seed ~/.codex/auth.json from the placeholder via `codex login --with-api-key`, so
# Codex authenticates whether it reads the env var or its auth.json. Best-effort:
# a workspace without the codex CLI just skips it (see the script).
[[mount]]
overlay = "setup.d/codex-setup.sh"
target  = "/opt/codex-setup.sh"

[[setup]]
run   = "bash /opt/codex-setup.sh"
user  = "workspace"
order = 20
