# preset: toolchain — a dev CLI toolchain via mise. Pure container pack (no credential).
#
# The tool set is data-driven and COMPOSABLE: the installer reads the UNION of
# every /opt/toolchain/tools.d/*.list, so a profile adds tools by mounting
# ANOTHER fragment (this pack ships the lean base; the example template adds
# tools.d/extras.list). Change the toolset by editing/adding fragments.
#
# These lists are the workspace's tool INVENTORY (col1 = install source, col3 = an
# optional agent-facing note; format in base.list). The claude-code pack's tools.sh
# renders the advertised subset (rows with a note that pass `command -v`) into the
# session context — so the note can't drift from what's present, and toolchain stays
# free of that coupling.

[[mount]]
overlay = "setup.d/toolchain.sh"
target  = "/opt/toolchain.sh"

[[mount]]
overlay = "tools.d/base.list"
target  = "/opt/toolchain/tools.d/10-base.list"      # NN orders the union scan

# Activate mise in the interactive login shell so the installed CLIs are on PATH
# (not just in setup steps). Assumes the default devcontainer image's oh-my-zsh +
# vscode user; on another shell/image, shadow this pack or drop this mount.
[[mount]]
overlay = "omz-custom/mise.zsh"
target  = "/home/vscode/.oh-my-zsh/custom/mise.zsh"

[[setup]]
run   = "bash /opt/toolchain.sh"
user  = "workspace"
order = 10                                            # first: later steps use the tools

[env]
LANG = "C.UTF-8"          # image defaults to POSIX; UTF-8 fixes prompt-glyph width + unicode tools
COLORTERM = "truecolor"   # 24-bit color for color-aware CLIs (bat, …) + Claude Code's launch env
