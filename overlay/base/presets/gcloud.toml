# preset: gcloud ŌĆö make `gcloud`, `gsutil`, and `bq` work inside the workspace off
# the host's Google login, without the host's durable credential (user refresh
# token or service-account key) ever entering the container.
#
# STRATEGY (host-minted access token + bearer swap):
#   - The `gcloud` provider shells out on the HOST to `gcloud auth
#     print-access-token`, minting a ~1h OAuth2 access token from whatever login
#     the host has (user or service account). Only that short-lived token is
#     resolved; the refresh token / SA key stay on the host.
#   - The `bearer` part swaps the inert placeholder for the real token inside the
#     `Authorization` header on every *.googleapis.com request.
#   - `env = CLOUDSDK_AUTH_ACCESS_TOKEN` makes gcloud send the placeholder as its
#     bearer AND skip all refresh logic, so the workspace never even contacts the
#     token endpoint ŌĆö the only intercepted host is the API glob below.
#
# EXPIRY: because the token is resolved at push time and held statically by the
# proxy, it expires after ~1h. Re-run `credp push` to mint a fresh one (there is
# no data-plane provider re-invoke; the proxy never calls providers).
#
# CA TRUST: gcloud bundles its own Python transport and ignores SSL_CERT_FILE /
# REQUESTS_CA_BUNDLE ŌĆö it honors only CLOUDSDK_CORE_CUSTOM_CA_CERTS_FILE, set in
# [env] below to the proxy's full CA bundle (system roots + proxy CA, so
# passthrough Google hosts keep working). That file is materialized by the CA
# bootstrap: the default credproxy image bootstraps automatically; on a BYO image,
# compose this with the `proxy-ca` preset.
#
# Flagless off the host's active gcloud login. Override the identity with
# `--secret adc` (application-default), `--secret <account-email>`, or
# `--secret impersonate:<sa-email>` (see `credproxy provider show gcloud`).

default_provider = "gcloud"
default_secret   = "default"                          # the host's active gcloud account

# A plausible ya29.* access token so any client-side format sniff passes. The
# placeholder never reaches Google ŌĆö the proxy swaps it ŌĆö and gcloud uses
# CLOUDSDK_AUTH_ACCESS_TOKEN verbatim, so the marker is safe.
[placeholder]
prefix  = "ya29.credproxy-"
length  = 64
charset = "base64url"

# gcloud reads the proxy CA from here (system roots + proxy CA bundle).
[env]
CLOUDSDK_CORE_CUSTOM_CA_CERTS_FILE = "/tmp/proxy-ca.crt"

[[part]]
suffix   = "api"                                      # -> binding gcloud-api
injector = "bearer"
hosts    = ["*.googleapis.com"]                       # compute, storage, bigquery, sts, all regional
env      = "CLOUDSDK_AUTH_ACCESS_TOKEN"

# The host's `gcloud` must be installed + logged in (the gcloud provider reads its
# login). Advisory at add/create, authoritative at `doctor`.
[[requires]]
kind    = "command"
command = "gcloud"
hint    = "install the Google Cloud SDK: https://cloud.google.com/sdk/docs/install"

[[requires]]
kind  = "provider"
fetch = true                                          # test-fetch under `doctor NAME --fetch`
hint  = "authenticate the host CLI: gcloud auth login"
