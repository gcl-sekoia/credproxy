# preset: proxy-ca — trust the credproxy proxy's CA inside the workspace. Pure
# container pack (one root setup step, no credential).
#
# A BYO image (like the devcontainer base) doesn't trust the proxy's TLS CA out of
# the box, so every intercepted HTTPS host errors until this runs. The step fetches
# and installs the CA over plain HTTP from the in-netns sentinel (no CA needed for
# that hop). The credproxy *default* workspace image bootstraps automatically — a
# template built on it wouldn't need this pack; that's why it's composable, not
# baked into the engine.

[[setup]]
run   = "curl -fsSL http://proxy.local/bootstrap.sh | sh"
user  = "root"                                        # installs into the system trust store
order = 0                                             # before everything else
