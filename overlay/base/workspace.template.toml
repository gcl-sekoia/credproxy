# Workspace config generated from the base profile — a neutral, reusable scaffold
# composed of the base overlay's generic preset packs, nothing opinionated. Edit
# freely. (How the overlays layer — see overlay/base/README.md.)

# Optional: host directory for loose-surface cwd-addressing (`cd here && credp enter`).
# directory = "/absolute/path/to/project"

auto_stop = true

image = "mcr.microsoft.com/devcontainers/base:ubuntu"
user = "vscode"
user_uid = 1000
map_host_user = true

shell = ["zsh", "--login"]

# Extra host env vars forwarded into the workspace on `enter`/`exec` when set on
# your host (bare names -- copied if present, skipped if not). credproxy always
# forwards a safe set of terminal capability hints; these four are added because
# they can misbehave on a MINIMAL image but are safe on this devcontainer base
# (TERM needs its terminfo entry; the locale vars need the locale generated).
# Trim this line on a stripped-down image. Exec-only.
forward_env = ["TERM", "LANG", "LC_ALL", "LC_CTYPE"]

workdir = "/workdir"
mounts = [
  # The project to work on. EDIT THIS before `start`: point `bind` at your
  # project's absolute host path (`~` expands). The placeholder path does not
  # exist on purpose, so `start` fails loudly until you set a real one.
  { bind    = "/EDIT-ME/absolute/path/to/your/project", target = "/workdir" },
  # (The packs ship their own mounts; the toolchain pack even ships the mise-
  # activation shell drop-in. Setup steps + env all come from the packs below.)
]

# Preset packs — the building blocks this workspace is assembled from. `create`
# expands each [[preset]] into ordinary config (mounts above; setup steps, [env],
# and [[binding]]/[[rule]] blocks below, each tagged `# credproxy:preset`) and drops
# the [[preset]] lines — so a generated <name>.toml shows only the expansion. See
# `credproxy preset list`.

[[preset]]
name = "proxy-ca"           # trust the proxy CA (this image doesn't out of the box)

[[preset]]
name = "toolchain"

# cache (opt-in): a /cache volume for regenerable toolchain state (mise installs, uv
# pythons, XDG cache) so a recreate skips re-installing the toolchain. Readily
# discardable (`recreate --reset-volume cache`) — the toolchain setup re-runs on that
# recreate and repopulates it. Uncomment to persist the toolchain across recreates:
# [[preset]]
# name = "cache"

[[preset]]
name = "github-auth"        # provider=gh-cli, secret=github.com (defaults; needs a host `gh auth login`)

# Claude Code (opt-in) — one pack wires the whole client: the Anthropic token,
# onboarding-skip + client-settings merge, a SessionStart orientation hook, and
# keeping the CLI latest. Needs the `claude` CLI (add it to a tools.d fragment) and
# a token source (no neutral default vault). Uncomment + point at YOUR secret:
# [[preset]]
# name     = "claude-code"
# provider = "bw"
# secret   = "claude-code-oauth-token"

# git-signing (opt-in): sign commits with a key in a forwarded ssh-agent. Create
# the host socket dir first (bin/credproxy-signing-agent), then uncomment:
# [[preset]]
# name = "git-signing"
# [preset.options]
# sock_dir = "~/.ssh/credproxy-agent"
