# Workspace config generated from the 50-example profile — an opinionated,
# batteries-included starting point (persistent data volume, a fuller tool kit,
# opinionated Claude settings, the claude-managed-settings pack). Edit freely.
# (How the overlays layer — see overlay/50-example/README.md.)

# directory = "/absolute/path/to/project"   # loose-surface cwd-addressing

auto_stop = true

image = "mcr.microsoft.com/devcontainers/base:ubuntu"
user = "vscode"
user_uid = 1000
map_host_user = true

shell = ["zsh", "--login"]

# Extra host env vars forwarded into the workspace on `enter`/`exec` when set on
# your host (bare names -- copied if present, skipped if not), on top of the
# always-safe built-in set (color/hyperlink/emulator hints). These four are the
# image-specific, double-edged ones: safe on this devcontainer base, but on a
# MINIMAL image remove any that misbehave (listed one per line so that's easy).
# Exec-only.
forward_env = [
  "TERM",      # terminal type -- a minimal image may lack its terminfo ("terminal not found")
  "LANG",      # locale -- forwarding one the image hasn't generated -> setlocale warnings
  "LC_ALL",    # locale (same caveat as LANG)
  "LC_CTYPE",  # locale (same caveat as LANG)
]

workdir = "/workdir"
mounts = [
  # The project to work on. EDIT before `start` (the placeholder path won't exist).
  { bind    = "/EDIT-ME/absolute/path/to/your/project", target = "/workdir" },
  # This profile's prompt tweak (the toolchain pack ships the mise-activation drop-in).
  { overlay = "omz-custom/prompt.zsh", target = "/home/vscode/.oh-my-zsh/custom/prompt.zsh" },
  # toolchain: this profile's extra tools, union-merged with the pack's base.list.
  { overlay = "tools.d/extras.list", target = "/opt/toolchain/tools.d/20-extras.list" },
  # claude-code: this profile's client settings defaults (the pack merges them if present).
  { overlay = "claude-settings-defaults.json", target = "/opt/claude-code/settings-defaults.json" },
  # claude-code: agent defs the pack installs into $CLAUDE_CONFIG_DIR/agents/ (one per file).
  { overlay = "agents/oracle.md", target = "/opt/claude-code/agents.d/oracle.md" },
  { overlay = "agents/sol.md", target = "/opt/claude-code/agents.d/sol.md" },
  # claude-code: skills the pack installs into $CLAUDE_CONFIG_DIR/skills/ (one dir per skill).
  { overlay = "skills/suggesting-bindings", target = "/opt/claude-code/skills.d/suggesting-bindings" },
  # claude-code session context: profile note (copy-me) — edit session-context.d/example.sh,
  # then uncomment (claude-code's hook concatenates every /opt/session-context.d/*.sh):
  # { overlay = "session-context.d/example.sh", target = "/opt/session-context.d/30-example.sh" },
]

# Packs — the building blocks this workspace is assembled from. `create`
# expands each [[pack]] into ordinary config (mounts above; setup steps, [env],
# and [[binding]]/[[rule]] blocks below, each tagged `# credproxy:pack`) and drops
# the [[pack]] lines — so a generated <name>.toml shows only the expansion. See
# `credproxy pack list`. (Here: proxy-ca bootstraps the CA, toolchain carries
# LANG/COLORTERM, cache carries the /cache toolchain-state volume, persist carries
# the /persist volume + CLAUDE_CONFIG_DIR/HISTFILE.)

[[pack]]
name = "proxy-ca"           # trust the proxy CA (this image doesn't out of the box)

[[pack]]
name = "toolchain"

[[pack]]
name = "cache"              # /cache volume: regenerable toolchain state (mise/uv), readily discardable

[[pack]]
name = "persist"            # /persist volume + CLAUDE_CONFIG_DIR/HISTFILE, durable across recreates

# The umbrella Claude Code pack (token + onboarding + client-settings merge + the
# SessionStart orientation hook + keep-the-CLI-latest). Token from Bitwarden here.
[[pack]]
name     = "claude-code"
provider = "bw"
secret   = "claude-code-oauth-token"

[[pack]]
name = "github-auth"        # provider=gh-cli, secret=github.com (defaults; needs a host `gh auth login`)

[[pack]]
name = "claude-managed-settings"    # this overlay's opinionated pack: strips org-pushed setting gates

# codex (opt-in): run OpenAI's Codex CLI off an injected API key (extras.list ships
# the CLI). Neutral pack — point provider/secret at your vault, then uncomment:
# [[pack]]
# name     = "codex"
# provider = "bw"
# secret   = "openai-api-key"

# git-signing (opt-in): sign commits with a key in a forwarded ssh-agent. Create
# the host socket dir first (bin/credproxy-signing-agent), then uncomment:
# [[pack]]
# name = "git-signing"
# [pack.options]
# sock_dir = "~/.ssh/credproxy-agent"
