# Workspace config generated from the 50-example profile — an opinionated,
# batteries-included starting point (persistent data volume, a fuller tool kit,
# opinionated Claude settings, the claude-managed-settings pack). Edit freely.
# (How the overlays layer — see overlay/50-example/README.md.)

# directory = "/absolute/path/to/project"   # loose-surface cwd-addressing

auto_stop = true

image = "mcr.microsoft.com/devcontainers/base:ubuntu"
user = "vscode"
user_uid = 1000
map_host_user = true

shell = ["zsh", "--login"]

workdir = "/workdir"
mounts = [
  # The project to work on. EDIT before `start` (the placeholder path won't exist).
  { bind    = "/EDIT-ME/absolute/path/to/your/project", target = "/workdir" },
  # This profile's prompt tweak (the toolchain pack ships the mise-activation drop-in).
  { overlay = "omz-custom/prompt.zsh", target = "/home/vscode/.oh-my-zsh/custom/prompt.zsh" },
  # toolchain: this profile's extra tools, union-merged with the pack's base.list.
  { overlay = "tools.d/extras.list", target = "/opt/toolchain/tools.d/20-extras.list" },
  # claude-code: this profile's client settings defaults (the pack merges them if present).
  { overlay = "claude-settings-defaults.json", target = "/opt/claude-code/settings-defaults.json" },
  # claude-code session context: profile note (copy-me) — edit session-context.d/example.sh,
  # then uncomment (claude-code's hook concatenates every /opt/session-context.d/*.sh):
  # { overlay = "session-context.d/example.sh", target = "/opt/session-context.d/30-example.sh" },
]

# Preset packs — the building blocks this workspace is assembled from. `create`
# expands each [[preset]] into ordinary config (mounts above; setup steps, [env],
# and [[binding]]/[[rule]] blocks below, each tagged `# credproxy:preset`) and drops
# the [[preset]] lines — so a generated <name>.toml shows only the expansion. See
# `credproxy preset list`. (Here: proxy-ca bootstraps the CA, persist carries the
# /persist volume + CLAUDE_CONFIG_DIR/HISTFILE, toolchain carries LANG/COLORTERM.)

[[preset]]
name = "proxy-ca"           # trust the proxy CA (this image doesn't out of the box)

[[preset]]
name = "toolchain"

[[preset]]
name = "persist"            # /persist volume + CLAUDE_CONFIG_DIR/HISTFILE, durable across recreates

# The umbrella Claude Code pack (token + onboarding + client-settings merge + the
# SessionStart orientation hook + keep-the-CLI-latest). Token from Bitwarden here.
[[preset]]
name     = "claude-code"
provider = "bw"
secret   = "claude-code-oauth-token"

[[preset]]
name = "github-auth"        # provider=gh-cli, secret=github.com (defaults; needs a host `gh auth login`)

[[preset]]
name = "claude-managed-settings"    # this overlay's opinionated pack: strips org-pushed setting gates

# git-signing (opt-in): sign commits with a key in a forwarded ssh-agent. Create
# the host socket dir first (bin/credproxy-signing-agent), then uncomment:
# [[preset]]
# name = "git-signing"
# [preset.options]
# sock_dir = "~/.ssh/credproxy-agent"
