# preset: persist — durable state that survives a container recreate, on one
# managed volume. Pure container pack (no credential), opinionated (it decides
# WHAT to persist), hence in this profile overlay rather than base.
#
# The volume mounts at /persist; a pre-setup root step chowns it to the workspace
# user (a fresh managed volume is root-owned, and setup steps below write into it
# as the user — so `user_owned = true`, which chowns POST-setup, would be too
# late). The env points Claude's config dir and the shell history file at it.

[[mount]]
volume = "persist"
target = "/persist"

[[setup]]
run   = "chown \"$CREDPROXY_USER:\" /persist"          # colon = owner + primary group
user  = "root"
order = 5                                              # after proxy-ca (0), before user setup steps

[env]
CLAUDE_CONFIG_DIR = "/persist/claude"   # Claude config survives recreates
HISTFILE = "/persist/zsh_history"       # zsh history survives recreates (oh-my-zsh honors a preset HISTFILE)
